<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2_Jsv3jyre4Hu0iaew5bzprkN9fdhSi4",
    authDomain: "saja-pharmacy.firebaseapp.com",
    projectId: "saja-pharmacy",
    storageBucket: "saja-pharmacy.firebasestorage.app",
    messagingSenderId: "292288798852",
    appId: "1:292288798852:web:23fc2fcdf26c032493e2d1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const STORE_DOC = "store/data";

  // Save entire state to Firebase
  async function fbSave(state) {
    try {
      const ref = doc(db, "store", "data");
      await setDoc(ref, {
        products: state.products,
        orders: state.orders,
        settings: state.settings,
        _version: state._version
      });
    } catch(e) {
      console.error("Firebase save error:", e);
    }
  }

  // Listen for real-time changes
  function fbListen(callback) {
    const ref = doc(db, "store", "data");
    return onSnapshot(ref, (snap) => {
      if (snap.exists()) {
        callback(snap.data());
      }
    });
  }

  // Load once on startup
  async function fbLoad() {
    const ref = doc(db, "store", "data");
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data() : null;
  }

  window.__fb = { fbSave, fbListen, fbLoad };
  window.dispatchEvent(new Event("fb-ready"));
</script>

<style>

  /* TOAST */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; transition: transform 0.3s, opacity 0.3s; opacity: 0; white-space: nowrap; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(82,192,120,0.4); color: var(--success); }
  .toast.error { border-color: rgba(224,82,82,0.4); color: var(--danger); }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
</style>

<script>
// ===== STATE =====
let state = {
  products: [],
  orders: [],
  settings: {
    storeName: 'SAJA Store',
    tagline: 'SAJA Store',
    adminPass: 'admin123',
    logo: null
  },
  currentProductId: null,
  _version: "v3"
};

let fbReady = false;
let unsubscribe = null;

// ===== WAIT FOR FIREBASE =====
window.addEventListener("fb-ready", async () => {
  fbReady = true;
  try {
    // Load initial data
    const data = await window.__fb.fbLoad();
    if (data) {
      state.products = data.products || [];
      state.orders = data.orders || [];
      state.settings = data.settings || state.settings;
    }

    // Listen for real-time changes from other devices
    unsubscribe = window.__fb.fbListen((data) => {
      state.products = data.products || [];
      state.orders = data.orders || [];
      state.settings = data.settings || state.settings;
      // Re-render current view silently
      const storeActive = document.getElementById('view-store').classList.contains('active');
      const adminActive = document.getElementById('view-admin').classList.contains('active');
      if (storeActive) renderStore();
      if (adminActive) renderAdmin();
    });

  } catch(e) {
    console.error("Firebase load error:", e);
  }

  // Hide loading overlay
  document.getElementById('loadingOverlay').style.display = 'none';
  renderStore();
});

// ===== SAVE =====
async function save() {
  if (!fbReady) return;
  await window.__fb.fbSave(state);
}

// ===== VIEWS =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'view-store') renderStore();
  if (id === 'view-admin') renderAdmin();
}

// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'settings') loadSettings();
  if (tab === 'products') renderAdminProducts();
}

// ===== RENDER STORE =====
function renderStore() {
  const logoImg = document.getElementById('storeLogoImg');
  const nameEl = document.getElementById('storeName');
  if (state.settings.logo) {
    logoImg.src = state.settings.logo;
    logoImg.style.display = 'block';
    nameEl.style.display = 'none';
  } else {
    logoImg.style.display = 'none';
    nameEl.style.display = '';
    nameEl.innerHTML = state.settings.storeName || 'متجر <span>الأكواد</span>';
  }
  document.getElementById('storeTagline').textContent = state.settings.tagline;
  const grid = document.getElementById('productsGrid');

  if (state.products.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">🛍</div>
      <p style="font-size:18px;font-weight:300">لا توجد منتجات بعد</p>
    </div>`;
    return;
  }

  grid.innerHTML = state.products.map(p => {
    const soldOut = p.stock <= 0;
    const low = p.stock > 0 && p.stock <= 3;
    return `
    <div class="product-card${soldOut ? ' sold-out' : ''}">
      ${p.img
        ? `<img src="${p.img}" class="product-img" alt="${p.name}">`
        : `<div class="product-img-placeholder">🎁</div>`}
      ${soldOut ? `<div class="sold-out-overlay">SOLD OUT</div>` : ''}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc || ''}</div>
        <div class="product-meta">
          <span class="product-price">${p.price}</span>
          <span class="product-stock${low ? ' low' : ''}">${soldOut ? 'نفذت الكمية' : `${p.stock} متبقي`}</span>
        </div>
        <button class="buy-btn" ${soldOut ? 'disabled' : `onclick="openModal('${p.id}')"`}>
          ${soldOut ? '🚫 نفذت الكمية' : '🛒 اطلب الآن'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
function openModal(productId) {
  state.currentProductId = productId;
  const p = state.products.find(x => x.id === productId);
  document.getElementById('modalProductName').textContent = p.name;
  document.getElementById('modalProductPrice').textContent = p.price;
  document.getElementById('buyName').value = '';
  document.getElementById('buyEmail').value = '';
  document.getElementById('buyQty').value = '1';
  document.getElementById('buyModal').classList.add('open');
}

function closeModal() {
  document.getElementById('buyModal').classList.remove('open');
  state.currentProductId = null;
}

document.getElementById('buyModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== CONFIRM ORDER =====
async function confirmOrder() {
  const name = document.getElementById('buyName').value.trim();
  const email = document.getElementById('buyEmail').value.trim();
  const qty = parseInt(document.getElementById('buyQty').value) || 1;

  if (!name) { showToast('الرجاء إدخال اسمك', 'error'); return; }
  if (!email || !email.includes('@')) { showToast('الرجاء إدخال بريد إلكتروني صحيح', 'error'); return; }
  if (qty < 1) { showToast('الكمية يجب أن تكون 1 على الأقل', 'error'); return; }

  const p = state.products.find(x => x.id === state.currentProductId);
  if (!p) return;

  if (qty > p.stock) {
    showToast(`الكمية المتاحة فقط ${p.stock} قطع`, 'error');
    return;
  }

  const orderId = 'ORD-' + Date.now().toString(36).toUpperCase();
  const order = {
    id: orderId,
    productId: p.id,
    productName: p.name,
    productPrice: p.price,
    name, email, qty,
    date: new Date().toLocaleString('ar-SA'),
    timestamp: Date.now()
  };

  state.orders.unshift(order);
  p.stock -= qty;

  await save();
  closeModal();
  document.getElementById('successOrderId').textContent = orderId;
  showView('view-success');
}

// ===== ADMIN LOGIN =====
function adminLogin() {
  const pass = document.getElementById('adminPassInput').value;
  const err = document.getElementById('loginError');
  if (pass === state.settings.adminPass) {
    err.style.display = 'none';
    document.getElementById('adminPassInput').value = '';
    showView('view-admin');
  } else {
    err.style.display = 'block';
  }
}

function adminLogout() { showView('view-store'); }

// ===== RENDER ADMIN =====
function renderAdmin() {
  renderOrders();
  renderAdminProducts();
}

function renderOrders() {
  const orders = state.orders;
  document.getElementById('ordersCount').textContent = orders.length + ' طلب';
  const container = document.getElementById('ordersContainer');
  if (orders.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>لا توجد طلبات بعد</p></div>`;
    return;
  }
  container.innerHTML = `<table class="orders-table">
    <thead><tr><th>#</th><th>رقم الطلب</th><th>الاسم</th><th>البريد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>التاريخ</th><th>الحالة</th><th>فاتورة</th><th>حذف</th></tr></thead>
    <tbody>${orders.map((o, i) => `
      <tr>
        <td style="color:var(--muted);font-size:13px">${i + 1}</td>
        <td><span class="order-num">${o.id}</span></td>
        <td style="font-weight:600">${o.name}</td>
        <td style="direction:ltr;text-align:right;font-size:12px;color:var(--muted)">${o.email}</td>
        <td><span class="order-product-badge">${o.productName}</span></td>
        <td style="font-weight:900;color:var(--accent);font-size:16px">${o.qty}</td>
        <td style="font-weight:800;color:#2a7a4f">${calcTotal(o)}</td>
        <td style="font-size:12px;color:var(--muted)">${o.date}</td>
        <td><span class="status-new">جديد</span></td>
        <td><button class="btn-invoice" onclick="showInvoice('${o.id}')">🧾</button></td>
        <td><button class="btn-delete-order" onclick="deleteOrder('${o.id}')">🗑</button></td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function deleteOrder(id) {
  if (!confirm('هل تريد حذف هذا الطلب؟')) return;
  state.orders = state.orders.filter(o => o.id !== id);
  await save();
  renderOrders();
  showToast('تم حذف الطلب', 'success');
}

// ===== PRODUCTS ADMIN =====
function renderAdminProducts() {
  const list = document.getElementById('adminProductsList');
  if (state.products.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📦</div><p>لا توجد منتجات بعد</p></div>`;
    return;
  }
  list.innerHTML = state.products.map(p => `
    <div class="product-admin-card">
      ${p.img
        ? `<img src="${p.img}" class="product-admin-thumb" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0">`
        : `<div class="product-admin-thumb">🎁</div>`}
      <div class="product-admin-info">
        <div class="product-admin-name">${p.name}</div>
        <div class="product-admin-meta">
          <span class="meta-chip gold">${p.price}</span>
          <span class="meta-chip">${p.stock <= 0 ? 'نفذت' : p.stock + ' قطعة'}</span>
        </div>
      </div>
      <div class="stock-control">
        <button class="stock-btn" onclick="changeStock('${p.id}', -1)">−</button>
        <span class="stock-num">${p.stock}</span>
        <button class="stock-btn" onclick="changeStock('${p.id}', 1)">+</button>
      </div>
      <button class="btn-del-product" onclick="deleteProduct('${p.id}')">🗑</button>
    </div>
  `).join('');
}

async function changeStock(id, delta) {
  const p = state.products.find(x => x.id === id);
  if (!p) return;
  p.stock = Math.max(0, p.stock + delta);
  await save();
  renderAdminProducts();
}

async function deleteProduct(id) {
  if (!confirm('هل تريد حذف هذا المنتج؟')) return;
  state.products = state.products.filter(p => p.id !== id);
  await save();
  renderAdminProducts();
  showToast('تم حذف المنتج', 'success');
}

// ===== IMAGE PREVIEW =====
let imgDataUrl = null;
function previewImg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgDataUrl = e.target.result;
    const preview = document.getElementById('imgPreview');
    preview.src = imgDataUrl; preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// ===== ADD PRODUCT =====
async function addProduct() {
  const name = document.getElementById('p_name').value.trim();
  const desc = document.getElementById('p_desc').value.trim();
  const price = document.getElementById('p_price').value.trim();
  const stock = parseInt(document.getElementById('p_stock').value) || 0;
  if (!name || !price) { showToast('الرجاء إدخال اسم المنتج والسعر', 'error'); return; }
  state.products.push({ id: 'P-' + Date.now().toString(36), name, desc, price, stock, img: imgDataUrl || null });
  await save();
  document.getElementById('p_name').value = '';
  document.getElementById('p_desc').value = '';
  document.getElementById('p_price').value = '';
  document.getElementById('p_stock').value = '';
  document.getElementById('p_img').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  imgDataUrl = null;
  renderAdminProducts();
  showToast('تم إضافة المنتج بنجاح! ✓', 'success');
}

// ===== LOGO =====
let logoDataUrl = null;
function previewLogo(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoDataUrl = e.target.result;
    const preview = document.getElementById('logoPreview');
    preview.src = logoDataUrl; preview.style.display = 'block';
    document.getElementById('removeLogoBtn').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

async function removeLogo() {
  logoDataUrl = null;
  state.settings.logo = null;
  document.getElementById('logoPreview').style.display = 'none';
  document.getElementById('removeLogoBtn').style.display = 'none';
  document.getElementById('s_logo').value = '';
  await save();
  showToast('تم حذف اللوقو', 'success');
}

// ===== SETTINGS =====
function loadSettings() {
  document.getElementById('s_name').value = state.settings.storeName;
  document.getElementById('s_tagline').value = state.settings.tagline;
  document.getElementById('s_pass').value = '';
  const preview = document.getElementById('logoPreview');
  const removeBtn = document.getElementById('removeLogoBtn');
  if (state.settings.logo) {
    preview.src = state.settings.logo; preview.style.display = 'block';
    removeBtn.style.display = 'inline-block';
  } else {
    preview.style.display = 'none'; removeBtn.style.display = 'none';
  }
}

async function saveSettings() {
  const name = document.getElementById('s_name').value.trim();
  const tagline = document.getElementById('s_tagline').value.trim();
  const pass = document.getElementById('s_pass').value;
  if (name) state.settings.storeName = name;
  if (tagline) state.settings.tagline = tagline;
  if (pass) state.settings.adminPass = pass;
  if (logoDataUrl) state.settings.logo = logoDataUrl;
  await save();
  showToast('تم حفظ الإعدادات ✓', 'success');
}

// ===== EXPORT EXCEL =====
function exportToExcel() {
  if (state.orders.length === 0) { showToast('لا توجد طلبات للتصدير', 'error'); return; }
  const rows = state.orders.map((o, i) => {
    const p = state.products.find(x => x.id === o.productId);
    const unitPrice = p ? p.price : o.productPrice || '—';
    const priceNum = parseFloat((unitPrice + '').replace(/[^\d.]/g, ''));
    const total = !isNaN(priceNum) ? (priceNum * o.qty) + ' ' + (unitPrice + '').replace(/[\d.,]/g, '').trim() : '—';
    return { '#': i + 1, 'رقم الطلب': o.id, 'الاسم': o.name, 'البريد': o.email, 'المنتج': o.productName, 'الكمية': o.qty, 'الإجمالي': total, 'التاريخ': o.date };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'الطلبات');
  XLSX.writeFile(wb, `طلبات_${state.settings.storeName || 'SAJA'}_${new Date().toLocaleDateString('ar-SA').replace(/\//g, '-')}.xlsx`);
  showToast('✅ تم تصدير الطلبات بنجاح!', 'success');
}

// ===== CALC TOTAL =====
function calcTotal(order) {
  const p = state.products.find(x => x.id === order.productId);
  const priceStr = (p ? p.price : order.productPrice || '').toString();
  const num = parseFloat(priceStr.replace(/[^\d.]/g, ''));
  if (isNaN(num)) return priceStr || '—';
  const unit = priceStr.replace(/[\d.,]/g, '').trim();
  return (num * order.qty).toLocaleString('ar-SA') + ' ' + unit;
}

// ===== INVOICE =====
function showInvoice(orderId) {
  const o = state.orders.find(x => x.id === orderId);
  if (!o) return;
  const p = state.products.find(x => x.id === o.productId);
  const unitPrice = p ? p.price : (o.productPrice || '—');
  const total = calcTotal(o);
  const logo = state.settings.logo || '';
  const storeName = state.settings.storeName || 'SAJA Store';
  const logoHTML = logo
    ? '<img src="' + logo + '" alt="logo" style="height:54px;max-width:170px;object-fit:contain">'
    : '<div style="font-size:22px;font-weight:900;color:#1a1a2e">' + storeName + '</div>';

  const invoiceHTML = '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>فاتورة ' + o.id + '</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">'
    + '<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tajawal",sans-serif;background:#f0f0f5;padding:32px;color:#1a1a2e}.page{background:#fff;border-radius:16px;padding:48px;max-width:640px;margin:0 auto;box-shadow:0 4px 32px rgba(0,0,0,0.10)}.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:28px;border-bottom:2px solid #f0f0f5;margin-bottom:32px}.inv-label h2{font-size:32px;font-weight:900;color:#c9a84c}.inv-label p{font-size:13px;color:#999;margin-top:4px}.section{margin-bottom:24px}.section-title{font-size:11px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.info-item{background:#f8f8fa;border-radius:8px;padding:12px 16px}.info-item .lbl{font-size:11px;color:#aaa;font-weight:600;margin-bottom:4px}.info-item .val{font-size:15px;font-weight:700}table{width:100%;border-collapse:collapse;margin-bottom:24px}thead th{text-align:right;padding:10px 14px;background:#f8f8fa;font-size:12px;font-weight:800;color:#888}tbody td{padding:14px;border-bottom:1px solid #f0f0f5;font-size:14px}.total-row{background:linear-gradient(135deg,#fdf8ee,#fff9e8)}.total-row td{font-size:17px;font-weight:900;color:#c9a84c;border:none;padding:16px 14px}.badge{display:inline-block;background:rgba(82,192,120,0.1);border:1px solid rgba(82,192,120,0.3);color:#3aa86a;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700}.print-btn{display:block;width:100%;margin-top:24px;background:linear-gradient(135deg,#c9a84c,#e8c96b);color:#fff;border:none;padding:14px;border-radius:10px;font-family:"Tajawal",sans-serif;font-size:16px;font-weight:800;cursor:pointer}@media print{.print-btn{display:none}body{background:#fff;padding:0}.page{box-shadow:none;border-radius:0}}</style></head><body>'
    + '<div class="page"><div class="header"><div>' + logoHTML + '</div><div class="inv-label"><h2>فاتورة</h2><p>رقم: ' + o.id + '</p><p style="margin-top:4px">' + o.date + '</p></div></div>'
    + '<div class="section"><div class="section-title">بيانات العميل</div><div class="info-grid"><div class="info-item"><div class="lbl">الاسم</div><div class="val">' + o.name + '</div></div><div class="info-item"><div class="lbl">البريد الإلكتروني</div><div class="val" style="direction:ltr;font-size:13px">' + o.email + '</div></div></div></div>'
    + '<div class="section"><div class="section-title">تفاصيل الطلب</div><table><thead><tr><th>المنتج</th><th>سعر الوحدة</th><th>الكمية</th><th>الإجمالي</th></tr></thead><tbody><tr><td style="font-weight:700">' + o.productName + '</td><td>' + unitPrice + '</td><td style="font-weight:900;color:#c9a84c;font-size:18px">' + o.qty + '</td><td style="font-weight:800">' + total + '</td></tr><tr class="total-row"><td colspan="3" style="text-align:left;font-size:13px;color:#aaa">المجموع الكلي</td><td>' + total + '</td></tr></tbody></table></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;background:#f8f8fa;border-radius:10px;padding:14px 18px;margin-bottom:24px"><span style="font-size:14px;color:#888">حالة الطلب</span><span class="badge">✓ تم الاستلام</span></div>'
    + '<div style="text-align:center;padding-top:24px;border-top:1px solid #f0f0f5;color:#ccc;font-size:12px">' + storeName + ' • شكراً لثقتك بنا</div>'
    + '<button class="print-btn" onclick="window.print()">🖨 طباعة الفاتورة</button></div></body></html>';

  const win = window.open('', '_blank', 'width=750,height=750');
  win.document.write(invoiceHTML);
  win.document.close();
}
</script>
</body>
</html>
