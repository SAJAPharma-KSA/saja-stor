<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2_Jsv3jyre4Hu0iaew5bzprkN9fdhSi4",
    authDomain: "saja-pharmacy.firebaseapp.com",
    projectId: "saja-pharmacy",
    storageBucket: "saja-pharmacy.firebasestorage.app",
    messagingSenderId: "292288798852",
    appId: "1:292288798852:web:23fc2fcdf26c032493e2d1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const STORE_DOC = "store/data";

  // Save entire state to Firebase
  async function fbSave(state) {
    const payload = {
      products: state.products,
      orders: state.orders,
      settings: state.settings,
      _version: state._version
    };

    // التحقق من حجم المستند قبل الإرسال (حد Firestore: 1 ميغابايت = 1,048,576 بايت)
    const sizeBytes = new Blob([JSON.stringify(payload)]).size;
    const sizeKB = (sizeBytes / 1024).toFixed(1);
    const FIRESTORE_LIMIT = 1048576;

    if (sizeBytes > FIRESTORE_LIMIT) {
      const msg = `❌ الحفظ فشل: حجم البيانات ${sizeKB}KB تجاوز حد Firebase (1024KB). الرجاء استخدام صور أصغر أو حذف منتجات قديمة.`;
      console.error(msg);
      if (window.showToast) window.showToast(msg, 'error');
      throw new Error('FIRESTORE_SIZE_LIMIT');
    }

    try {
      const ref = doc(db, "store", "data");
      await setDoc(ref, payload);
      console.log(`✓ تم الحفظ في Firebase (${sizeKB}KB)`);
      return true;
    } catch(e) {
      console.error("Firebase save error:", e);
      if (window.showToast) window.showToast('❌ فشل الحفظ في Firebase: ' + (e.message || e.code || 'خطأ غير معروف'), 'error');
      throw e;
    }
  }

  // Listen for real-time changes
  function fbListen(callback) {
    const ref = doc(db, "store", "data");
    return onSnapshot(ref, (snap) => {
      if (snap.exists()) {
        callback(snap.data());
      }
    });
  }

  // Load once on startup
  async function fbLoad() {
    const ref = doc(db, "store", "data");
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data() : null;
  }

  window.__fb = { fbSave, fbListen, fbLoad };
  window.dispatchEvent(new Event("fb-ready"));
</script>

// ===== ضغط الصور (لتفادي تجاوز حد Firebase 1MB) =====
// يضغط الصورة إلى أبعاد قصوى مع جودة JPEG متغيرة حتى يصبح حجمها أقل من maxSizeKB
async function compressImage(file, maxDimension = 800, maxSizeKB = 150) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // حساب الأبعاد الجديدة مع الحفاظ على النسبة
        let { width, height } = img;
        if (width > height) {
          if (width > maxDimension) { height = Math.round(height * maxDimension / width); width = maxDimension; }
        } else {
          if (height > maxDimension) { width = Math.round(width * maxDimension / height); height = maxDimension; }
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; // خلفية بيضاء لتفادي شفافية PNG
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        // محاولة الضغط بجودات متعدرّجة
        let quality = 0.85;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        // حجم Base64 ≈ (length * 3/4)
        while ((dataUrl.length * 0.75) > maxSizeKB * 1024 && quality > 0.3) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let fbReady = false;
let unsubscribe = null;

// ===== WAIT FOR FIREBASE =====
window.addEventListener("fb-ready", async () => {
  fbReady = true;
  try {
    // Load initial data
    const data = await window.__fb.fbLoad();
    if (data) {
      state.products = data.products || [];
      state.orders = data.orders || [];
      state.settings = data.settings || state.settings;
    }

    // Listen for real-time changes from other devices
    unsubscribe = window.__fb.fbListen((data) => {
      state.products = data.products || [];
      state.orders = data.orders || [];
      state.settings = data.settings || state.settings;
      // Re-render current view silently
      const storeActive = document.getElementById('view-store').classList.contains('active');
      const adminActive = document.getElementById('view-admin').classList.contains('active');
      if (storeActive) renderStore();
      if (adminActive) renderAdmin();
    });

  } catch(e) {
    console.error("Firebase load error:", e);
  }

  // Hide loading overlay
  document.getElementById('loadingOverlay').style.display = 'none';
  renderStore();
});

// ===== SAVE =====
// نُعرّف showToast على window حتى يصلها fbSave (الذي يعيش في module منفصل)
window.showToast = function(msg, type = '') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
};

async function save() {
  if (!fbReady) {
    window.showToast('⏳ Firebase لم يجهز بعد، حاول مرة أخرى', 'error');
    return false;
  }
  try {
    await window.__fb.fbSave(state);
    return true;
  } catch(e) {
    console.error('Save failed:', e);
    return false;
  }
}

// ===== VIEWS =====
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'view-store') renderStore();
  if (id === 'view-admin') renderAdmin();
}

// ===== TOAST =====
// (showToast الآن معرّفة على window في قسم SAVE أعلاه)
function showToast(msg, type = '') { window.showToast(msg, type); }

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'settings') loadSettings();
  if (tab === 'products') renderAdminProducts();
}

// ===== RENDER STORE =====
function renderStore() {
  const logoImg = document.getElementById('storeLogoImg');
  const nameEl = document.getElementById('storeName');
  if (state.settings.logo) {
    logoImg.src = state.settings.logo;
    logoImg.style.display = 'block';
    // نُظهر اللوغو والاسم معاً (الاسم يصبح أصغر بجانب اللوغو)
    nameEl.style.display = '';
    nameEl.style.fontSize = '16px';
    nameEl.innerHTML = state.settings.storeName || 'SAJA Store';
  } else {
    logoImg.style.display = 'none';
    nameEl.style.display = '';
    nameEl.style.fontSize = '';
    nameEl.innerHTML = state.settings.storeName || 'متجر <span>الأكواد</span>';
  }
  document.getElementById('storeTagline').textContent = state.settings.tagline;
  const grid = document.getElementById('productsGrid');

  if (state.products.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">🛍</div>
      <p style="font-size:18px;font-weight:300">لا توجد منتجات بعد</p>
    </div>`;
    return;
  }

  grid.innerHTML = state.products.map(p => {
    const soldOut = p.stock <= 0;
    const low = p.stock > 0 && p.stock <= 3;
    return `
    <div class="product-card${soldOut ? ' sold-out' : ''}">
      ${p.img
        ? `<img src="${p.img}" class="product-img" alt="${p.name}">`
        : `<div class="product-img-placeholder">🎁</div>`}
      ${soldOut ? `<div class="sold-out-overlay">SOLD OUT</div>` : ''}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc || ''}</div>
        <div class="product-meta">
          <span class="product-price">${p.price}</span>
          <span class="product-stock${low ? ' low' : ''}">${soldOut ? 'نفذت الكمية' : `${p.stock} متبقي`}</span>
        </div>
        <button class="buy-btn" ${soldOut ? 'disabled' : `onclick="openModal('${p.id}')"`}>
          ${soldOut ? '🚫 نفذت الكمية' : '🛒 اطلب الآن'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
function openModal(productId) {
  state.currentProductId = productId;
  const p = state.products.find(x => x.id === productId);
  document.getElementById('modalProductName').textContent = p.name;
  document.getElementById('modalProductPrice').textContent = p.price;
  document.getElementById('buyName').value = '';
  document.getElementById('buyEmail').value = '';
  document.getElementById('buyQty').value = '1';
  document.getElementById('buyModal').classList.add('open');
}

function closeModal() {
  document.getElementById('buyModal').classList.remove('open');
  state.currentProductId = null;
}

document.getElementById('buyModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== CONFIRM ORDER =====
async function confirmOrder() {
  const name = document.getElementById('buyName').value.trim();
  const email = document.getElementById('buyEmail').value.trim();
  const qty = parseInt(document.getElementById('buyQty').value) || 1;

  if (!name) { showToast('الرجاء إدخال اسمك', 'error'); return; }
  if (!email || !email.includes('@')) { showToast('الرجاء إدخال بريد إلكتروني صحيح', 'error'); return; }
  if (qty < 1) { showToast('الكمية يجب أن تكون 1 على الأقل', 'error'); return; }

  const p = state.products.find(x => x.id === state.currentProductId);
  if (!p) return;

  if (qty > p.stock) {
    showToast(`الكمية المتاحة فقط ${p.stock} قطع`, 'error');
    return;
  }

  const orderId = 'ORD-' + Date.now().toString(36).toUpperCase();
  const order = {
    id: orderId,
    productId: p.id,
    productName: p.name,
    productPrice: p.price,
    name, email, qty,
    date: new Date().toLocaleString('ar-SA'),
    timestamp: Date.now()
  };

  state.orders.unshift(order);
  p.stock -= qty;

  await save();
  closeModal();
  document.getElementById('successOrderId').textContent = orderId;
  showView('view-success');
}

// ===== ADMIN LOGIN =====
function adminLogin() {
  const pass = document.getElementById('adminPassInput').value;
  const err = document.getElementById('loginError');
  if (pass === state.settings.adminPass) {
    err.style.display = 'none';
    document.getElementById('adminPassInput').value = '';
    showView('view-admin');
  } else {
    err.style.display = 'block';
  }
}

function adminLogout() { showView('view-store'); }

// ===== RENDER ADMIN =====
function renderAdmin() {
  renderOrders();
  renderAdminProducts();
}

function renderOrders() {
  const orders = state.orders;
  document.getElementById('ordersCount').textContent = orders.length + ' طلب';
  const container = document.getElementById('ordersContainer');
  if (orders.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>لا توجد طلبات بعد</p></div>`;
    return;
  }
  container.innerHTML = `<table class="orders-table">
    <thead><tr><th>#</th><th>رقم الطلب</th><th>الاسم</th><th>البريد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>التاريخ</th><th>الحالة</th><th>فاتورة</th><th>حذف</th></tr></thead>
    <tbody>${orders.map((o, i) => `
      <tr>
        <td style="color:var(--muted);font-size:13px">${i + 1}</td>
        <td><span class="order-num">${o.id}</span></td>
        <td style="font-weight:600">${o.name}</td>
        <td style="direction:ltr;text-align:right;font-size:12px;color:var(--muted)">${o.email}</td>
        <td><span class="order-product-badge">${o.productName}</span></td>
        <td style="font-weight:900;color:var(--accent);font-size:16px">${o.qty}</td>
        <td style="font-weight:800;color:#2a7a4f">${calcTotal(o)}</td>
        <td style="font-size:12px;color:var(--muted)">${o.date}</td>
        <td><span class="status-new">جديد</span></td>
        <td><button class="btn-invoice" onclick="showInvoice('${o.id}')">🧾</button></td>
        <td><button class="btn-delete-order" onclick="deleteOrder('${o.id}')">🗑</button></td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function deleteOrder(id) {
  if (!confirm('هل تريد حذف هذا الطلب؟')) return;
  state.orders = state.orders.filter(o => o.id !== id);
  await save();
  renderOrders();
  showToast('تم حذف الطلب', 'success');
}

// ===== PRODUCTS ADMIN =====
function renderAdminProducts() {
  const list = document.getElementById('adminProductsList');
  if (state.products.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📦</div><p>لا توجد منتجات بعد</p></div>`;
    return;
  }
  list.innerHTML = state.products.map(p => `
    <div class="product-admin-card">
      ${p.img
        ? `<img src="${p.img}" class="product-admin-thumb" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0">`
        : `<div class="product-admin-thumb">🎁</div>`}
      <div class="product-admin-info">
        <div class="product-admin-name">${p.name}</div>
        <div class="product-admin-meta">
          <span class="meta-chip gold">${p.price}</span>
          <span class="meta-chip">${p.stock <= 0 ? 'نفذت' : p.stock + ' قطعة'}</span>
        </div>
      </div>
      <div class="stock-control">
        <button class="stock-btn" onclick="changeStock('${p.id}', -1)">−</button>
        <span class="stock-num">${p.stock}</span>
        <button class="stock-btn" onclick="changeStock('${p.id}', 1)">+</button>
      </div>
      <button class="btn-del-product" onclick="deleteProduct('${p.id}')">🗑</button>
    </div>
  `).join('');
}

async function changeStock(id, delta) {
  const p = state.products.find(x => x.id === id);
  if (!p) return;
  p.stock = Math.max(0, p.stock + delta);
  await save();
  renderAdminProducts();
}

async function deleteProduct(id) {
  if (!confirm('هل تريد حذف هذا المنتج؟')) return;
  state.products = state.products.filter(p => p.id !== id);
  await save();
  renderAdminProducts();
  showToast('تم حذف المنتج', 'success');
}

// ===== IMAGE PREVIEW (مع ضغط تلقائي) =====
let imgDataUrl = null;
async function previewImg(input) {
  const file = input.files[0]; if (!file) return;
  const preview = document.getElementById('imgPreview');
  try {
    showToast('جاري ضغط الصورة...', '');
    // ضغط إلى 800px قصوى وحد أقصى 150KB
    imgDataUrl = await compressImage(file, 800, 150);
    preview.src = imgDataUrl;
    preview.style.display = 'block';
    const finalKB = ((imgDataUrl.length * 0.75) / 1024).toFixed(1);
    showToast(`✓ تم ضغط الصورة (${finalKB}KB)`, 'success');
  } catch(err) {
    console.error('Image compression error:', err);
    showToast('❌ فشل معالجة الصورة', 'error');
    imgDataUrl = null;
    preview.style.display = 'none';
  }
}

// ===== ADD PRODUCT =====
async function addProduct() {
  const name = document.getElementById('p_name').value.trim();
  const desc = document.getElementById('p_desc').value.trim();
  const price = document.getElementById('p_price').value.trim();
  const stock = parseInt(document.getElementById('p_stock').value) || 0;
  if (!name || !price) { showToast('الرجاء إدخال اسم المنتج والسعر', 'error'); return; }

  const newProduct = { id: 'P-' + Date.now().toString(36), name, desc, price, stock, img: imgDataUrl || null };
  state.products.push(newProduct);

  const ok = await save();
  if (!ok) {
    // الحفظ في Firebase فشل → نُلغي الإضافة المحلية حتى لا يخدع الواجهة
    state.products = state.products.filter(p => p.id !== newProduct.id);
    renderAdminProducts();
    return; // showToast الخطأ ظهر بالفعل من fbSave
  }

  document.getElementById('p_name').value = '';
  document.getElementById('p_desc').value = '';
  document.getElementById('p_price').value = '';
  document.getElementById('p_stock').value = '';
  document.getElementById('p_img').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  imgDataUrl = null;
  renderAdminProducts();
  showToast('تم إضافة المنتج بنجاح! ✓', 'success');
}

// ===== SETTINGS =====
function loadSettings() {
  document.getElementById('s_name').value = state.settings.storeName;
  document.getElementById('s_tagline').value = state.settings.tagline;

// ===== EXPORT EXCEL =====
function exportToExcel() {
  if (state.orders.length === 0) { showToast('لا توجد طلبات للتصدير', 'error'); return; }
  const rows = state.orders.map((o, i) => {
    const p = state.products.find(x => x.id === o.productId);
    const unitPrice = p ? p.price : o.productPrice || '—';
    const priceNum = parseFloat((unitPrice + '').replace(/[^\d.]/g, ''));
    const total = !isNaN(priceNum) ? (priceNum * o.qty) + ' ' + (unitPrice + '').replace(/[\d.,]/g, '').trim() : '—';
    return { '#': i + 1, 'رقم الطلب': o.id, 'الاسم': o.name, 'البريد': o.email, 'المنتج': o.productName, 'الكمية': o.qty, 'الإجمالي': total, 'التاريخ': o.date };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'الطلبات');
  XLSX.writeFile(wb, `طلبات_${state.settings.storeName || 'SAJA'}_${new Date().toLocaleDateString('ar-SA').replace(/\//g, '-')}.xlsx`);
  showToast('✅ تم تصدير الطلبات بنجاح!', 'success');
}

// ===== EXPORT CUSTOMERS =====
// تصدير قائمة الزبائن الذين قاموا بالطلب (بدون تكرار) مع إحصاءات لكل زبون
function exportCustomers() {
  if (state.orders.length === 0) { showToast('لا توجد طلبات بعد', 'error'); return; }

  // تجميع الطلبات حسب البريد (مفتاح فريد للزبون)
  const customersMap = {};
  state.orders.forEach(o => {
    const key = (o.email || o.name || '').toLowerCase().trim();
    if (!key) return;
    if (!customersMap[key]) {
      customersMap[key] = {
        name: o.name,
        email: o.email,
        orderCount: 0,
        totalQty: 0,
        totalSpent: 0,
        currency: '',
        products: new Set(),
        firstOrder: o.date,
        lastOrder: o.date
      };
    }
    const c = customersMap[key];
    c.orderCount++;
    c.totalQty += (o.qty || 0);

    // حساب الإجمالي
    const p = state.products.find(x => x.id === o.productId);
    const priceStr = (p ? p.price : o.productPrice || '').toString();
    const priceNum = parseFloat(priceStr.replace(/[^\d.]/g, ''));
    if (!isNaN(priceNum)) {
      c.totalSpent += priceNum * (o.qty || 0);
      const unit = priceStr.replace(/[\d.,]/g, '').trim();
      if (unit && !c.currency) c.currency = unit;
    }
    c.products.add(o.productName);
    if (o.date < c.firstOrder) c.firstOrder = o.date;
    if (o.date > c.lastOrder) c.lastOrder = o.date;
  });

  const customers = Object.values(customersMap);
  if (customers.length === 0) { showToast('لا يوجد زبائن للتصدير', 'error'); return; }

  // الترتيب حسب الأكثر إنفاقاً
  customers.sort((a, b) => b.totalSpent - a.totalSpent);

  const rows = customers.map((c, i) => ({
    '#': i + 1,
    'الاسم': c.name,
    'البريد الإلكتروني': c.email,
    'عدد الطلبات': c.orderCount,
    'إجمالي الكمية': c.totalQty,
    'إجمالي الإنفاق': c.totalSpent > 0 ? (c.totalSpent.toLocaleString('ar-SA') + ' ' + c.currency).trim() : '—',
    'المنتجات المشتراة': Array.from(c.products).join('، '),
    'أول طلب': c.firstOrder,
    'آخر طلب': c.lastOrder
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  // تحديد عرض الأعمدة لقراءة أفضل
  ws['!cols'] = [{wch:5},{wch:20},{wch:28},{wch:12},{wch:14},{wch:18},{wch:40},{wch:18},{wch:18}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'الزبائن');
  const fileName = `زبائن_${state.settings.storeName || 'SAJA'}_${new Date().toLocaleDateString('ar-SA').replace(/\//g, '-')}.xlsx`;
  XLSX.writeFile(wb, fileName);
  showToast(`✅ تم تصدير ${customers.length} زبون بنجاح!`, 'success');
}

// ===== CALC TOTAL =====
function calcTotal(order) {
  const p = state.products.find(x => x.id === order.productId);
  const priceStr = (p ? p.price : order.productPrice || '').toString();
  const num = parseFloat(priceStr.replace(/[^\d.]/g, ''));
  if (isNaN(num)) return priceStr || '—';
  const unit = priceStr.replace(/[\d.,]/g, '').trim();
  return (num * order.qty).toLocaleString('ar-SA') + ' ' + unit;
}

    + '<div class="section"><div class="section-title">تفاصيل الطلب</div><table><thead><tr><th>المنتج</th><th>سعر الوحدة</th><th>الكمية</th><th>الإجمالي</th></tr></thead><tbody><tr><td style="font-weight:700">' + o.productName + '</td><td>' + unitPrice + '</td><td style="font-weight:900;color:#c9a84c;font-size:18px">' + o.qty + '</td><td style="font-weight:800">' + total + '</td></tr><tr class="total-row"><td colspan="3" style="text-align:left;font-size:13px;color:#aaa">المجموع الكلي</td><td>' + total + '</td></tr></tbody></table></div>'
